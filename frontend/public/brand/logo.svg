<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  role="img"
  aria-label="litopc Simulator logo"
  shape-rendering="geometricPrecision"
>
  <rect width="1024" height="1024" fill="#000" />

  <!-- Main wordmark (H ~= 160) -->
  <text
    x="512"
    y="430"
    text-anchor="middle"
    fill="#fff"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="160"
    letter-spacing="0.01em"
    text-rendering="geometricPrecision"
  >
    <tspan font-weight="600">OPC</tspan>
    <tspan> </tspan>
    <tspan font-weight="400">Lab</tspan>
  </text>

  <!-- Divider: thickness ~= H*0.016, length ~= 0.93 * wordmark width -->
  <rect x="224" y="462" width="576" height="2" fill="#fff" />

  <!-- Tagline: size ~= H*0.31, gap below divider ~= H*0.32 -->
  <text
    x="512"
    y="566"
    text-anchor="middle"
    fill="#fff"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="50"
    font-weight="300"
    letter-spacing="0.04em"
    text-rendering="geometricPrecision"
  >
    Simulator
  </text>
</svg>
