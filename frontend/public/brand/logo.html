<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>litopc Wordmark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./logo.css" />
  </head>
  <body>
    <div class="logo-grid">
      <div>
        <div class="logo-artboard">
          <div class="wordmark-logo">
            <h1 class="wordmark-main"><span class="opc">OPC</span> <span class="lab">Lab</span></h1>
            <div class="wordmark-divider" aria-hidden="true"></div>
            <p class="wordmark-tagline">Simulator</p>
          </div>
        </div>
        <div class="variant-label">Default (OPC 600)</div>
      </div>

      <div>
        <div class="logo-artboard variant-opc500">
          <div class="wordmark-logo">
            <h1 class="wordmark-main"><span class="opc">OPC</span> <span class="lab">Lab</span></h1>
            <div class="wordmark-divider" aria-hidden="true"></div>
            <p class="wordmark-tagline">Simulator</p>
          </div>
        </div>
        <div class="variant-label">A/B Variant (OPC 500)</div>
      </div>
    </div>
  </body>
</html>
